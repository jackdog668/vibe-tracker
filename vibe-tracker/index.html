<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>Vibe Tracker <span class="flame" id="topFlame"></span></h1>
  </header>

  <main>
    <!-- Check-in -->
    <section id="view-checkin" class="view">
      <h2>Today's Check-In</h2>
      <p class="muted" id="checkinDate"></p>

      <label class="lbl">How's your vibe?</label>
      <div class="row" id="vibeRow">
        <button class="pick" data-val="1">😤</button>
        <button class="pick" data-val="2">😕</button>
        <button class="pick" data-val="3">😐</button>
        <button class="pick" data-val="4">😊</button>
        <button class="pick" data-val="5">🔥</button>
      </div>

      <label class="lbl">Productivity</label>
      <div class="row" id="prodRow">
        <button class="pick star" data-val="1">★</button>
        <button class="pick star" data-val="2">★</button>
        <button class="pick star" data-val="3">★</button>
        <button class="pick star" data-val="4">★</button>
        <button class="pick star" data-val="5">★</button>
      </div>

      <label class="lbl">Journal note <span class="muted" id="charCount">0/280</span></label>
      <textarea id="noteInput" maxlength="280" placeholder="Optional: what happened today?"></textarea>

      <button id="saveBtn" class="primary">Save Check-In</button>
      <div id="toast" class="toast"></div>
    </section>

    <!-- Dashboard -->
    <section id="view-dashboard" class="view hidden">
      <h2>Weekly Dashboard</h2>
      <div class="stats">
        <div class="stat"><span class="num" id="statAvgVibe">—</span><span class="lbl2">Avg Vibe</span></div>
        <div class="stat"><span class="num" id="statAvgProd">—</span><span class="lbl2">Avg Prod</span></div>
        <div class="stat"><span class="num" id="statTotal">0</span><span class="lbl2">Entries</span></div>
        <div class="stat"><span class="num" id="statStreak">0 <span class="flame" id="streakFlame"></span></span><span class="lbl2">Streak</span></div>
      </div>
      <div class="card"><canvas id="vibeChart"></canvas></div>
      <div class="card"><canvas id="prodChart"></canvas></div>
      <p class="muted">Longest streak: <span id="longestStreak">0</span> days</p>
    </section>

    <!-- History -->
    <section id="view-history" class="view hidden">
      <h2>History</h2>
      <div id="historyList"></div>
      <p id="historyEmpty" class="muted hidden">No entries yet. Go check in!</p>
    </section>

    <!-- Settings -->
    <section id="view-settings" class="view hidden">
      <h2>Settings</h2>
      <button id="exportBtn" class="primary">Export JSON</button>
      <label class="primary file-label">
        Import JSON
        <input type="file" id="importInput" accept="application/json" hidden />
      </label>
      <button id="clearBtn" class="danger">Clear All Data</button>
      <p class="muted">All data lives in your browser's localStorage. Export regularly.</p>
    </section>
  </main>

  <nav class="tabbar">
    <a href="#checkin" data-tab="checkin">✏️<span>Check-In</span></a>
    <a href="#dashboard" data-tab="dashboard">📊<span>Dashboard</span></a>
    <a href="#history" data-tab="history">📜<span>History</span></a>
    <a href="#settings" data-tab="settings">⚙️<span>Settings</span></a>
  </nav>

  <script src="js/storage.js"></script>
  <script src="js/streaks.js"></script>
  <script src="js/checkin.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/history.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
